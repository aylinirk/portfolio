<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConCap — Hi-Fi Designs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#FAF8F5;min-height:100vh;font-family:'DM Sans',system-ui,sans-serif}
    #root{min-height:100vh}
    *{scrollbar-width:none}
    *::-webkit-scrollbar{display:none}
    @keyframes ccPulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.65)}}
    .screens-grid{display:grid;grid-template-columns:repeat(3,261px);gap:64px 40px;padding:32px 48px 64px;max-width:1200px;margin:0 auto;justify-content:center}
    .screen-item{display:flex;flex-direction:column;align-items:flex-start}
    .slide-dots{display:none}
    @media(max-width:700px){
      .screens-grid{display:flex;flex-wrap:nowrap;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;gap:0;padding:20px 0 0;max-width:none;justify-content:flex-start}
      .screen-item{flex:0 0 100vw;scroll-snap-align:center;align-items:center;padding:0 28px;box-sizing:border-box}
      .slide-dots{display:flex;justify-content:center;gap:8px;padding:16px 0 20px}
      .dot{width:6px;height:6px;border-radius:50%;background:rgba(62,74,110,0.2);transition:background 0.2s,transform 0.2s}
      .dot-active{background:#3E4A6E;transform:scale(1.3)}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── Shared components ─────────────────────────────────────────────────────────
function IcoBtn({ children, style={} }) {
  return (
    <button style={{ width:36, height:36, borderRadius:'50%', border:'none', background:'rgba(255,255,255,0.46)', backdropFilter:'blur(8px)', display:'flex', alignItems:'center', justifyContent:'center', color:CC.fg, cursor:'default', ...style }}>
      {children}
    </button>
  );
}

function Btn({ children, icon, variant='primary', full=true, height=52, style={} }) {
  const v = { primary:{background:CC.terra,color:'#fff'}, danger:{background:'oklch(0.34 0.18 25)',color:'#fff'}, secondary:{background:CC.muted,color:CC.fg} }[variant];
  return (
    <button style={{ height, borderRadius:100, border:'none', cursor:'default', display:'flex', alignItems:'center', justifyContent:'center', gap:8, fontSize:14, fontWeight:600, fontFamily:F, width:full?'100%':'auto', padding:'0 22px', ...v, ...style }}>
      {icon && <span style={{display:'flex',flexShrink:0}}>{icon}</span>}
      {children}
    </button>
  );
}

// Standard 3-tab bar matching actual screenshots
function TabBar({ active='capture' }) {
  const tabs=[{k:'capture',icon:IcoZapSm,label:'Capture'},{k:'conversations',icon:IcoList,label:'Conversations'},{k:'folders',icon:IcoFldr,label:'Folders'}];
  return (
    <div style={{ flexShrink:0, height:82, background:'rgba(255,255,255,0.96)', backdropFilter:'blur(24px)', borderTop:`1px solid ${CC.divider}`, display:'flex' }}>
      {tabs.map(t=>(
        <div key={t.k} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-start', paddingTop:10, gap:3 }}>
          <div style={{ color:active===t.k?CC.terra:CC.mutedFg, display:'flex' }}>{t.icon}</div>
          <span style={{ fontSize:10, fontWeight:active===t.k?700:500, color:active===t.k?CC.terra:CC.mutedFg, fontFamily:F }}>{t.label}</span>
        </div>
      ))}
    </div>
  );
}

    <div style={{ flexShrink:0, height:36, background:'oklch(0.94 0.016 245 / 0.55)', backdropFilter:'blur(8px)', borderBottom:`1px solid ${CC.divider}`, display:'flex', alignItems:'center', justifyContent:'center', gap:5 }}>

    </div>
  );
}

// Progress dots (step indicator)
function ProgressDots({ step=0 }) {
  return (
    <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', gap:7 }}>
      {[0,1].map(i=>(
        <div key={i} style={{ height:4, borderRadius:2, background:i<=step?CC.fg:CC.muted, width:i===step?24:8, transition:'all 0.3s' }}/>
      ))}
    </div>
  );
}

    <div style={{ display:'flex', gap:4, marginTop:7 }}>

// Extracted field row
function FieldRow({ icon, value }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:12, padding:'11px 14px', borderRadius:12, background:'rgba(255,255,255,0.72)', marginBottom:8 }}>

      <span style={{ fontSize:14, color:CC.fg, fontFamily:F }}>{value}</span>

// Radio option (HubSpot)
function RadioOpt({ label, sub, selected }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 16px', borderRadius:12, border:`1.5px solid ${selected?CC.terra:'rgba(20,20,60,0.10)'}`, background:selected?'oklch(0.95 0.025 240)':'#fff', marginBottom:8 }}>

// ── Screen 1: Home (welcome α=0.42) ──────────────────────────────────────────
function S1Home() {
  const recent=[{i:'DK',co:'Unnamed',name:"Dr. Kevin Arman Stäuble's Digital Bu…",t:'3d'},{i:'DK',co:'Unnamed',name:"Dr. Kevin Arman Stäuble's Digital Bu…",t:'3d'},{i:'SE',co:'Stäuble Elektrotechnik AG',name:'Reto Stäuble',t:'7d'}];

    <div style={{ height:874, overflow:'hidden', display:'flex', flexDirection:'column', paddingTop:62, fontFamily:F, ...GRAD.welcome }}>

  { num:'02', title:'Capture Methods',   sub:'scanning · α=0.62',   desc:'Floating back arrow + folder strip replace the nav bar. 5 capture modes in a 2+1 tile grid with platform marks.',        component:<S2Capture/> },
  { num:'03', title:'Card Result',       sub:'review · α=0.52',     desc:'Enriched view — OCR extracts name, company, job title and phone from the scanned card. "Looks good" confirms.',          component:<S3CardResult/> },

  { num:'05', title:'Conversation Card', sub:'welcome · α=0.42',    desc:'Captured contact, voice transcript, and notes in one view. Inline nav — no glass header bar.',                          component:<S5ConvDetail/> },
  { num:'06', title:'Sync to HubSpot',   sub:'idle · α=0.30',       desc:'Settings background visible above the rising bottom sheet. Radio options let the user sync new or all contacts.',      component:<S6HubSpot/> },
];

function App() {
  const [activeSlide, setActiveSlide] = useState(0);
  const gridRef = useRef(null);
  const handleScroll = () => {
    if (!gridRef.current) return;
    setActiveSlide(Math.round(gridRef.current.scrollLeft / gridRef.current.offsetWidth));
  };
  return (
    <div style={{ minHeight:'100vh', background:'#FAF8F5', fontFamily:F }}>
      <div className="screens-grid" ref={gridRef} onScroll={handleScroll}>
        {screens.map((s,i)=>(
          <div key={i} className="screen-item">
            <PhoneWrapper>{s.component}</PhoneWrapper>
            <Annotation num={s.num} title={s.title} sub={s.sub} desc={s.desc}/>
          </div>
        ))}
      </div>
      <div className="slide-dots">
        {screens.map((_,i)=>(
          <div key={i} className={`dot${i===activeSlide?' dot-active':''}`}/>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
