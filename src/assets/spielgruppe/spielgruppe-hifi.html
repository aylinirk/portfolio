<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spielgruppe Seon – Hi-Fi Screens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <style>
    :root {
      --sage:       oklch(0.64 0.09 148);
      --sage-light: oklch(0.88 0.05 148);
      --sage-dark:  oklch(0.48 0.09 148);
      --terra:      oklch(0.62 0.11 42);
      --terra-light:oklch(0.90 0.05 42);
      --cream:      oklch(0.97 0.015 85);
      --cream-dark: oklch(0.93 0.02 85);
      --honey:      oklch(0.84 0.11 88);
      --honey-light:oklch(0.95 0.06 88);
      --honey-dark: oklch(0.56 0.10 88);
      --ink:        oklch(0.26 0.02 85);
      --ink-mid:    oklch(0.45 0.02 85);
      --ink-light:  oklch(0.68 0.02 85);
      --white:      #fff;
      --font-d: 'Baloo 2', sans-serif;
      --font-b: 'Nunito', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-b);
      background: #FAF8F5;
      color: var(--ink);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Desktop grid ── */
    .frames-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 56px 32px;
      justify-items: center;
    }
    @media (max-width: 1100px) { .frames-grid { grid-template-columns: repeat(2, 1fr); } }

    .frame-cell { display: flex; flex-direction: column; align-items: center; gap: 20px; }

    /* ── Annotations — portfolio fonts ── */
    .frame-label { text-align: center; }
    .frame-label .step {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
      color: var(--ink-light); background: var(--white);
      border: 1.5px solid var(--cream-dark);
      padding: 3px 10px; border-radius: 999px; margin-bottom: 8px;
    }
    .frame-label h3 {
      font-family: 'Lora', serif;
      font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 4px;
    }
    .frame-label p {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; color: var(--ink-mid); max-width: 280px;
    }

    /* ── Mobile scroll-snap slider ── */
    .slide-dots { display: none; }
    @media (max-width: 700px) {
      .frames-grid {
        display: flex;
        flex-wrap: nowrap;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        gap: 0;
        padding: 20px 0 0;
      }
      .frames-grid::-webkit-scrollbar { display: none; }
      .frame-cell {
        flex: 0 0 100vw;
        scroll-snap-align: center;
        align-items: center;
        padding: 0 28px;
        box-sizing: border-box;
      }
      .slide-dots {
        display: flex;
        justify-content: center;
        gap: 8px;
        padding: 20px 0 24px;
      }
      .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: rgba(62,74,110,0.2);
        transition: background 0.2s, transform 0.2s;
      }
      .dot-active {
        background: #3E4A6E;
        transform: scale(1.3);
      }
    }

    /* ─ iPhone interior ─ */
    .ip {
      width: 100%; height: 100%;
      background: var(--cream);
      font-family: var(--font-b);
      color: var(--ink);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    /* Honey banner */
    .ip-banner {
      padding-top: 50px;
      background: var(--honey);
      color: var(--ink);
      flex-shrink: 0;
      position: relative;
    }
    .ip-banner-inner {
      padding: 8px 36px 10px;
      font-size: 0.66rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; text-align: center;
      position: relative;
      min-height: 32px;
    }
    .ip-banner-close {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 0.9rem; opacity: 0.5;
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .ip-nav {
      padding: 12px 14px 12px;
      background: oklch(0.97 0.015 85 / 0.96);
      border-bottom: 1px solid oklch(0.90 0.03 148 / 0.4);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      flex-shrink: 0;
    }
    .ip-nav.standalone { padding-top: 58px; padding-bottom: 12px; }

    .ip-logo-row {
      display: flex; align-items: center; gap: 8px;
    }
    .ip-logo-img {
      width: 32px; height: 32px;
      border-radius: 7px;
      background-color: var(--cream-dark);
      background-image: url('uploads/logo.png');
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }
    .ip-logo-text {
      font-family: var(--font-d);
      font-weight: 800;
      font-size: 0.82rem;
      color: var(--ink);
      line-height: 1.1;
    }
    .ip-logo-sub {
      font-size: 0.58rem;
      font-weight: 600;
      color: var(--ink-mid);
      letter-spacing: 0.02em;
    }
    .ip-burger { width: 22px; height: 22px; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
    .ip-burger span { display: block; height: 2px; background: var(--ink); border-radius: 1px; }

    .ip-content {
      flex: 1;
      padding: 14px 16px 28px;
      overflow: hidden;
    }

    .ip h1 { font-family: var(--font-d); font-size: 1.6rem; font-weight: 800; line-height: 1.05; letter-spacing: -0.01em; }
    .ip h1 .em-terra { color: var(--terra); }
    .ip h1 .em-sage  { color: var(--sage-dark); }
    .ip h1 .em-honey { color: var(--honey-dark); }
    .ip h2 { font-family: var(--font-d); font-size: 1.25rem; font-weight: 800; line-height: 1.1; color: var(--ink); }

    .ip .label {
      display: inline-block; font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--terra); margin-bottom: 6px;
    }
    .ip .label::before { content: "— "; }
    .ip .label-sage { color: var(--sage-dark); }
    .ip .sub { font-size: 0.74rem; color: var(--ink-mid); line-height: 1.5; }

    .ic-sage  { background: var(--sage-light);   color: var(--sage-dark); }
    .ic-terra { background: var(--terra-light);  color: var(--terra); }
    .ic-honey { background: var(--honey-light);  color: var(--honey-dark); }

    .btn-primary { background: var(--terra); color: white; border: none; font-family: var(--font-b); font-weight: 700; padding: 10px 18px; border-radius: 999px; font-size: 0.82rem; display: inline-flex; align-items: center; justify-content:center; gap: 6px; cursor: pointer; width:100%; }
    .btn-sage { background: var(--sage); color: white; border: none; font-family: var(--font-b); font-weight: 700; padding: 11px 18px; border-radius: 999px; font-size: 0.78rem; cursor: pointer; }
    .btn-outline { background: transparent; color: var(--sage-dark); border: 1.5px solid var(--sage); font-family: var(--font-b); font-weight: 700; padding: 9px 14px; border-radius: 999px; font-size: 0.78rem; width:100%; }

    /* Real photo placeholders */
    .photo-dina {
      background-image: url('uploads/dina-alt.jpg');
      background-size: cover;
      background-position: center 20%;
      background-color: var(--sage-light);
    }
    .photo-room {
      background-image: url('uploads/spielgruppe-raum.jpg');
      background-size: cover;
      background-position: center;
      background-color: var(--cream-dark);
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

function MobileFrame({ children }) {
  return (
    <IOSDevice width={360} height={760}>
      <div className="ip">{children}</div>
    </IOSDevice>
  );
}

/* ─ Top banner (honey) ─ */
function Banner() {
  return (
    <div className="ip-banner">
      <div className="ip-banner-inner">
        <span>🗓 Tag der offenen Tür · 17. Mai, 11–15 Uhr</span>
        <span className="ip-banner-close">✕</span>
      </div>
    </div>
  );
}

/* ─ Nav with logo + burger ─ */
function Nav({ standalone }) {
  return (
    <div className={"ip-nav" + (standalone ? " standalone" : "")}>
      <div className="ip-logo-row">
        <div className="ip-logo-img"/>
        <div>
          <div className="ip-logo-text">Spielgruppe Seon</div>
          <div className="ip-logo-sub">Oholten 3 · 5703 Seon</div>
        </div>
      </div>
      <div className="ip-burger"><span/><span/><span/></div>
    </div>
  );
}

/* Stroke icons */
const Ico = {
  cal:    <svg width="14" height="14" viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="13" rx="2" stroke="currentColor" strokeWidth="1.5"/><path d="M6 1v3M12 1v3M2 7h14" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  user:   <svg width="14" height="14" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="3.5" stroke="currentColor" strokeWidth="1.5"/><path d="M2 16c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  globe:  <svg width="14" height="14" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" strokeWidth="1.5"/><path d="M9 2c-2 2-3 4-3 7s1 5 3 7M9 2c2 2 3 4 3 7s-1 5-3 7M2 9h14" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  days:   <svg width="14" height="14" viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="13" rx="2" stroke="currentColor" strokeWidth="1.5"/><path d="M6 1v3M12 1v3M2 7h14M6 11h2M10 11h2M6 14h2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  sun:    <svg width="14" height="14" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="3.5" stroke="currentColor" strokeWidth="1.5"/><path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.1 3.1l1.4 1.4M13.5 13.5l1.4 1.4M14.9 3.1l-1.4 1.4M4.5 13.5l-1.4 1.4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  moon:   <svg width="14" height="14" viewBox="0 0 18 18" fill="none"><path d="M15 10.5A7 7 0 017.5 3 7 7 0 1015 10.5z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  pin:    <svg width="14" height="14" viewBox="0 0 18 18" fill="none"><path d="M9 1a6 6 0 016 6c0 4-6 10-6 10S3 11 3 7a6 6 0 016-6z" stroke="currentColor" strokeWidth="1.5"/><circle cx="9" cy="7" r="2" stroke="currentColor" strokeWidth="1.5"/></svg>,
  clock:  <svg width="14" height="14" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" strokeWidth="1.5"/><path d="M9 5v4l3 2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
};

function IconBox({ kind, icon, size=28, radius=8 }) {
  const cls = kind === 'sage' ? 'ic-sage' : kind === 'terra' ? 'ic-terra' : 'ic-honey';
  return <div className={cls} style={{ width: size, height: size, borderRadius: radius, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>{icon}</div>;
}

/* ════════════ 1 — HERO (with banner) ════════════ */
function ScreenHero() {
  return (
    <MobileFrame>
      <Banner/>
      <Nav />
      <div className="ip-content" style={{padding:'12px 18px 16px'}}>
        <h1 style={{fontSize:'1.5rem', marginBottom:8}}>
          Ein Ort zum<br/>
          <span className="em-terra">Spielen,</span> <span className="em-sage">Wachsen</span><br/>
          und <span className="em-honey">Entdecken</span>
        </h1>
        <p className="sub" style={{fontSize:'0.72rem', marginBottom:12, lineHeight:1.45}}>
          Die Spielgruppe Seon bietet Kindern ab 2½ Jahren einen liebevollen Ort, um die Welt zu erkunden – in einer kleinen, familiären Gruppe.
        </p>

        <div style={{display:'flex', flexDirection:'column', gap:6, marginBottom:14}}>
          <button className="btn-primary" style={{padding:'10px 14px', fontSize:'0.78rem'}}>Jetzt anmelden</button>
          <button className="btn-outline" style={{padding:'9px 12px', fontSize:'0.76rem'}}>Schnuppertag anfragen</button>
        </div>

        {/* Hero info card */}
        <div style={{
          background:'white', borderRadius:18, padding:'14px 14px',
          boxShadow:'0 10px 24px rgba(0,0,0,0.08)', position:'relative',
        }}>
          <div style={{position:'absolute', top:0, left:0, right:0, height:4, borderRadius:'18px 18px 0 0', background:'linear-gradient(90deg, var(--sage), var(--terra), var(--honey))'}}/>
          <div style={{
            position:'absolute', top:-10, right:10,
            background:'var(--honey)', color:'var(--ink)',
            fontSize:'0.6rem', fontWeight:700,
            padding:'3px 9px', borderRadius:999,
            boxShadow:'0 3px 8px rgba(0,0,0,0.1)',
          }}>🌿 Seon, AG</div>
          <div style={{textAlign:'center', marginBottom:8, paddingTop:6}}>
            <svg width="36" height="36" viewBox="0 0 40 40" fill="none" style={{display:'block', margin:'0 auto'}}>
              <rect width="40" height="40" rx="10" fill="oklch(0.88 0.05 148)"/>
              <rect x="18.5" y="26" width="3" height="8" rx="1.5" fill="oklch(0.48 0.09 148)"/>
              <polygon points="20,6 28,20 12,20" fill="oklch(0.64 0.09 148)"/>
              <polygon points="20,11 27,23 13,23" fill="oklch(0.55 0.09 148)"/>
              <circle cx="9" cy="9" r="2" fill="oklch(0.84 0.11 88)" opacity="0.8"/>
              <circle cx="31" cy="11" r="1.5" fill="oklch(0.62 0.11 42)" opacity="0.8"/>
            </svg>
            <div style={{fontFamily:'var(--font-d)', fontWeight:800, fontSize:'0.92rem', marginTop:4}}>Spielgruppe Seon</div>
          </div>
          <div style={{display:'flex', flexDirection:'column', gap:4}}>
            {[
              ['Tage', 'Mo – Fr'],
              ['Morgen', '08:45 – 11:30'],
              ['Nachmittag', '13:30 – 16:15'],
              ['Alter', 'ab 2½ Jahre'],
            ].map(([l,v]) => (
              <div key={l} style={{display:'flex', justifyContent:'space-between', padding:'6px 10px', background:'var(--cream)', borderRadius:7, fontSize:'0.7rem'}}>
                <span style={{color:'var(--ink-mid)', fontWeight:600}}>{l}</span>
                <span style={{fontWeight:800, color:'var(--ink)'}}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{
            position:'absolute', bottom:-9, left:14,
            background:'var(--sage)', color:'white',
            fontSize:'0.6rem', fontWeight:700,
            padding:'3px 9px', borderRadius:999,
            boxShadow:'0 3px 8px rgba(0,0,0,0.1)',
          }}>10+ Jahre Erfahrung</div>
        </div>
      </div>
    </MobileFrame>
  );
}

/* ════════════ 2 — ÜBER UNS ════════════ */
function ScreenUeber() {
  const bullets = [
    {kind:'sage',  text:'Das Kind steht im Mittelpunkt – mit seinen eigenen Bedürfnissen, seinem eigenen Tempo.'},
    {kind:'terra', text:'Klare Tagesstruktur mit wiederkehrenden Ritualen gibt Sicherheit.'},
    {kind:'honey', text:'Dina schafft eine wertschätzende, liebevolle Atmosphäre.'},
    {kind:'sage',  text:'Wir orientieren uns an den Qualitätsrichtlinien der IG Spielgruppe Schweiz.'},
  ];
  return (
    <MobileFrame>
      <Nav standalone/>
      <div className="ip-content" style={{background:'white', padding:'16px 18px'}}>
        <div className="label">Über uns</div>
        <h2 style={{marginBottom:10, fontSize:'1.45rem'}}>Klein, vertraut<br/>und herzlich</h2>
        <p className="sub" style={{marginBottom:14, fontSize:'0.74rem'}}>
          Die Spielgruppe Seon ist ein Ort, an dem Kinder in einer kleinen, familiären Gruppe spielen, lachen und die Welt entdecken.
        </p>

        <ul style={{listStyle:'none', display:'flex', flexDirection:'column', gap:8, marginBottom:14}}>
          {bullets.map((b,i)=>(
            <li key={i} style={{display:'flex', gap:9, alignItems:'flex-start'}}>
              <span className={b.kind==='sage'?'ic-sage':b.kind==='terra'?'ic-terra':'ic-honey'} style={{
                width:20, height:20, borderRadius:'50%', flexShrink:0,
                display:'flex', alignItems:'center', justifyContent:'center', marginTop:1
              }}>
                <svg width="10" height="10" viewBox="0 0 11 11"><path d="M2 5.5l2.5 2.5 4.5-4.5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>
              </span>
              <span style={{fontSize:'0.74rem', lineHeight:1.5, color:'var(--ink)'}}>{b.text}</span>
            </li>
          ))}
        </ul>

        {/* Real photo of the room */}
        <div className="photo-room" style={{
          width:'100%', aspectRatio:'4/3', borderRadius:14, marginBottom:0,
          border:'1.5px solid var(--cream-dark)',
        }}/>
      </div>
    </MobileFrame>
  );
}

/* ════════════ 3 — TEAM (real Dina photo) ════════════ */
function ScreenTeam() {
  return (
    <MobileFrame>
      <Nav standalone/>
      <div className="ip-content" style={{background:'white', padding:'16px 18px'}}>
        <div className="label label-sage" style={{textAlign:'center', display:'block', textTransform:'uppercase'}}>Das Team</div>
        <h2 style={{textAlign:'center', marginBottom:14, fontSize:'1.4rem'}}>Mit Herz und Erfahrung</h2>

        <div style={{background:'var(--cream)', borderRadius:18, padding:'14px 14px', border:'1.5px solid var(--cream-dark)'}}>
          {/* Real Dina photo */}
          <div className="photo-dina" style={{
            width:170, height:170, borderRadius:18, margin:'0 auto 12px',
          }}/>

          <h2 style={{textAlign:'center', fontSize:'1.15rem', marginBottom:1}}>Dina Vlachodimou</h2>
          <div style={{textAlign:'center', color:'var(--sage-dark)', fontWeight:700, fontSize:'0.72rem', marginBottom:10}}>Leiterin Spielgruppe Seon</div>

          <div style={{display:'flex', flexWrap:'wrap', gap:5, justifyContent:'center', marginBottom:10}}>
            {['Fachfrau Betreuung','Gruppenleiterin','10+ Jahre'].map(t=>(
              <span key={t} style={{background:'white', border:'1px solid var(--cream-dark)', padding:'3px 9px', borderRadius:999, fontSize:'0.62rem', fontWeight:600, color:'var(--ink-mid)'}}>{t}</span>
            ))}
          </div>

          <p style={{fontSize:'0.72rem', color:'var(--ink-mid)', lineHeight:1.55, marginBottom:12, textAlign:'left'}}>
            Ich begleite Kinder mit viel Herzblut und Fachwissen durch ihre ersten Schritte ausserhalb des Familienumfelds.
          </p>

          <div style={{textAlign:'center'}}>
            <button className="btn-sage" style={{padding:'9px 18px', fontSize:'0.74rem'}}>Kontakt aufnehmen</button>
          </div>
        </div>
      </div>
    </MobileFrame>
  );
}

/* ════════════ 4 — ZEITEN & PREISE ════════════ */
function ScreenPricing() {
  const InfoCell = ({kind, icon, label, value}) => (
    <div style={{background:'white', border:'1.5px solid var(--cream-dark)', borderRadius:11, padding:'9px 10px', display:'flex', flexDirection:'column', gap:4}}>
      <IconBox kind={kind} icon={icon} size={24} radius={7}/>
      <div style={{fontSize:'0.54rem', fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--ink-light)'}}>{label}</div>
      <div style={{fontFamily:'var(--font-d)', fontWeight:800, fontSize:'0.78rem', color:'var(--ink)', lineHeight:1.15}}>{value}</div>
    </div>
  );

  return (
    <MobileFrame>
      <Nav standalone/>
      <div className="ip-content" style={{padding:'14px 16px 14px'}}>
        <div className="label" style={{textAlign:'center', display:'block'}}>Zeiten & Preise</div>
        <h2 style={{textAlign:'center', marginBottom:12, fontSize:'1.35rem'}}>Transparent und fair</h2>

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:5, marginBottom:5}}>
          <InfoCell kind="sage"  icon={Ico.cal}   label="Start"    value="10. Aug 26"/>
          <InfoCell kind="terra" icon={Ico.user}  label="Alter"    value="ab 2½ J."/>
          <InfoCell kind="honey" icon={Ico.globe} label="Sprachen" value="CH DE GB"/>
        </div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:5, marginBottom:10}}>
          <InfoCell kind="sage"  icon={Ico.days}  label="Tage"   value="Mo – Fr"/>
          <InfoCell kind="terra" icon={Ico.sun}   label="Morgen 2:45h" value="08:45–11:30"/>
          <InfoCell kind="honey" icon={Ico.moon}  label="Nachm. 2:45h" value="13:30–16:15"/>
        </div>

        <div style={{background:'white', border:'1.5px solid var(--cream-dark)', borderRadius:12, overflow:'hidden'}}>
          <div style={{padding:'7px 12px', fontSize:'0.58rem', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:'var(--ink-mid)', background:'var(--cream)', borderBottom:'1.5px solid var(--cream-dark)'}}>
            Preis pro Kind / Monat
          </div>
          <div>
            <div style={{padding:'6px 12px 3px', fontSize:'0.55rem', fontWeight:700, textTransform:'uppercase', color:'var(--ink-light)'}}>Halbtag · 08:45–11:30 oder 13:30–16:15</div>
            {[
              ['1 Halbtag / Woche','CHF 140.–'],
              ['2 Halbtage / Woche','CHF 260.–'],
              ['3 Halbtage / Woche','CHF 380.–']
            ].map(([l,v], i, a)=>(
              <div key={l} style={{display:'flex', justifyContent:'space-between', padding:'8px 12px', borderBottom: i<a.length-1 ?'1px dashed oklch(0.93 0.02 85)':'none', fontSize:'0.74rem'}}>
                <span style={{fontWeight:600}}>{l}</span>
                <span style={{fontFamily:'var(--font-d)', fontWeight:800, color:'var(--sage-dark)'}}>{v}</span>
              </div>
            ))}
          </div>
        </div>

        <div style={{
          marginTop:10, padding:'8px 12px', background:'var(--honey-light)',
          border:'1px solid oklch(0.88 0.07 88)', borderRadius:18,
          fontSize:'0.66rem', color:'var(--ink-mid)', display:'flex', gap:7, alignItems:'center'
        }}>
          <span style={{color:'var(--honey-dark)', fontSize:'0.85rem', flexShrink:0}}>ⓘ</span>
          <span>Mehr als 3 Halbtage auch möglich auf Anfrage.</span>
        </div>
      </div>
    </MobileFrame>
  );
}

/* ════════════ 5 — ANMELDUNG (Form-zentriert, Mo–Fr) ════════════ */
function ScreenForm() {
  const Field = ({label, val, ph}) => (
    <div style={{marginBottom:5}}>
      <div style={{fontSize:'0.58rem', fontWeight:700, color:'var(--ink)', marginBottom:2}}>{label} <span style={{color:'var(--terra)'}}>*</span></div>
      <div style={{
        background:'var(--cream)', border:'1.5px solid var(--cream-dark)', borderRadius:7,
        padding:'6px 9px', fontSize:'0.68rem',
        color: val ? 'var(--ink)' : 'var(--ink-light)',
        fontWeight: val ? 600 : 400,
      }}>{val || ph}</div>
    </div>
  );

  const Check = ({label, sub, on}) => (
    <div style={{
      flex:1,
      display:'flex', alignItems:'center', gap:6,
      padding:'5px 8px', borderRadius:8, fontWeight:700,
      background: on ? 'var(--sage-light)' : 'var(--cream)',
      border:`1.5px solid ${on? 'var(--sage)' : 'var(--cream-dark)'}`,
      color: on ? 'var(--sage-dark)' : 'var(--ink-mid)',
      boxShadow: on ? '0 2px 8px oklch(0.64 0.09 148 / 0.2)' : 'none',
      lineHeight: 1.1,
      minWidth: 0,
    }}>
      <span style={{width:13, height:13, borderRadius:3, border:'1.5px solid currentColor', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, background: on? 'currentColor' : 'transparent'}}>
        {on && <svg width="7" height="7" viewBox="0 0 11 11"><path d="M2 5.5l2.5 2.5 4.5-4.5" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>}
      </span>
      <span style={{display:'flex', flexDirection:'column', alignItems:'flex-start', lineHeight:1.05, minWidth:0}}>
        <span style={{fontSize:'0.64rem'}}>{label}</span>
        {sub && <span style={{fontSize:'0.52rem', fontWeight:600, opacity:0.7, marginTop:1}}>{sub}</span>}
      </span>
    </div>
  );

  const days = [
    {day:'Montag',     mor:true,  nach:false},
    {day:'Dienstag',   mor:false, nach:false},
    {day:'Mittwoch',   mor:false, nach:true},
    {day:'Donnerstag', mor:false, nach:false},
    {day:'Freitag',    mor:false, nach:false},
  ];

  return (
    <MobileFrame>
      <Nav standalone/>
      <div className="ip-content" style={{padding:'12px 14px 12px'}}>

        <div style={{background:'white', borderRadius:14, padding:'12px 11px', border:'1.5px solid var(--cream-dark)'}}>
          <h2 style={{marginBottom:8, fontSize:'1rem'}}>Anmeldeformular</h2>

          <Field label="Name des Kindes" val="Lina Müller"/>
          <Field label="Geburtsdatum" val="04.03.2023"/>
          <Field label="Eltern" val="Anna Müller"/>
          <Field label="E-Mail" val="anna.mueller@beispiel.ch"/>
          <Field label="Telefon" val="079 123 45 67"/>

          <div style={{marginTop:6}}>
            <div style={{fontSize:'0.58rem', fontWeight:700, color:'var(--ink)', marginBottom:4}}>Gewünschte Tage <span style={{color:'var(--terra)'}}>*</span></div>

            {days.map((d,i)=>(
              <div key={d.day} style={{marginBottom: i<days.length-1 ? 4 : 0}}>
                <div style={{fontSize:'0.52rem', fontWeight:700, color:'var(--ink-mid)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:2}}>{d.day}</div>
                <div style={{display:'flex', gap:4}}>
                  <Check label="Morgen" sub="08:45–11:30" on={d.mor}/>
                  <Check label="Nachmittag" sub="13:30–16:15" on={d.nach}/>
                </div>
              </div>
            ))}
          </div>

          <button className="btn-primary" style={{marginTop:8, padding:'8px 14px', fontSize:'0.72rem'}}>Anmeldung absenden</button>
        </div>
      </div>
    </MobileFrame>
  );
}

/* ════════════ 6 — KONTAKT (Form-zentriert) ════════════ */
function ScreenContact() {
  const Field = ({label, val, big}) => (
    <div style={{marginBottom: big? 10 : 8}}>
      <div style={{fontSize:'0.62rem', fontWeight:700, color:'var(--ink)', marginBottom:3}}>{label}</div>
      <div style={{
        background:'var(--cream)', border:'1.5px solid var(--cream-dark)', borderRadius:7,
        padding: big ? '10px 10px' : '8px 10px',
        fontSize:'0.72rem', color:'var(--ink)', fontWeight: 600,
        minHeight: big ? 75 : 'auto', lineHeight: big ? 1.5 : 'inherit',
      }}>{val}</div>
    </div>
  );

  return (
    <MobileFrame>
      <Nav standalone/>
      <div className="ip-content" style={{padding:'14px 16px'}}>
        <div className="label" style={{marginBottom:4}}>Kontakt</div>
        <h2 style={{marginBottom:10, fontSize:'1.2rem'}}>Allgemeine Anfrage</h2>

        <div style={{background:'white', borderRadius:14, padding:'14px 14px', border:'1.5px solid var(--cream-dark)'}}>
          <Field label="Name *" val="Anna Müller"/>
          <Field label="E-Mail *" val="anna.mueller@beispiel.ch"/>
          <Field label="Betreff" val="Schnuppertag anfragen"/>
          <Field label="Nachricht *" val="Liebe Dina, wir würden gerne mit Lina einen Schnuppertag vereinbaren. Welche Tage passen euch am besten?" big/>

          <button className="btn-sage" style={{width:'100%', padding:'11px 16px', fontSize:'0.78rem'}}>Nachricht senden</button>
        </div>

        {/* Small contact strip below */}
        <div style={{display:'flex', gap:9, marginTop:10, padding:'8px 10px', background:'white', borderRadius:10, border:'1.5px solid var(--cream-dark)'}}>
          <IconBox kind="sage" icon={Ico.pin} size={24} radius={6}/>
          <div style={{fontSize:'0.64rem', color:'var(--ink-mid)', lineHeight:1.4}}>
            <strong style={{color:'var(--ink)'}}>Spielgruppe Seon</strong>
            <br/>Oholten 3 · 5703 Seon
          </div>
        </div>
      </div>
    </MobileFrame>
  );
}

/* ════════════ APP ════════════ */
function App() {
  const [activeSlide, setActiveSlide] = useState(0);
  const gridRef = useRef(null);

  const handleScroll = () => {
    if (!gridRef.current) return;
    setActiveSlide(Math.round(gridRef.current.scrollLeft / gridRef.current.offsetWidth));
  };

  const screens = [
    {step:'01', title:'Hero',         desc:'Sticky-Banner, klare Identität und sofortige Kerninfos.', component:<ScreenHero/>},
    {step:'02', title:'Über uns',     desc:'Werte als Bullets mit farbcodierten Häkchen + echtes Foto.', component:<ScreenUeber/>},
    {step:'03', title:'Team',         desc:'Dina im Mittelpunkt – Porträt, Rolle und Bio.', component:<ScreenTeam/>},
    {step:'04', title:'Preise',       desc:'Info-Boxen mit rotierenden Farben, transparente Preistabelle.', component:<ScreenPricing/>},
    {step:'05', title:'Anmeldung',    desc:'Formular im Fokus – Tagesauswahl Mo–Fr mit sanften Checkboxen.', component:<ScreenForm/>},
    {step:'06', title:'Kontakt',      desc:'Kontaktformular im Mittelpunkt für schnelle Anfragen.', component:<ScreenContact/>},
  ];

  return (
    <div style={{minHeight:'100vh', background:'#FAF8F5', padding:'40px 40px 80px', boxSizing:'border-box'}}>
      <div className="frames-grid" ref={gridRef} onScroll={handleScroll}>
        {screens.map((s,i)=>(
          <div key={i} className="frame-cell">
            {s.component}
            <div className="frame-label">
              <div className="step">{s.step} / 06</div>
              <h3>{s.title}</h3>
              <p>{s.desc}</p>
            </div>
          </div>
        ))}
      </div>
      <div className="slide-dots">
        {screens.map((_,i)=>(<div key={i} className={`dot${i===activeSlide?' dot-active':''}`}/>))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
